<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mcart | Order Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="site-bg"></div>

  <header class="topbar">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Mcart</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="checkout.html">Checkout</a>
      </nav>
      <button class="cart-icon-btn" type="button" data-open-cart>
        Cart <span class="cart-count" data-cart-count>0</span>
      </button>
    </div>
  </header>

  <main class="container section">
    <h1>Order Details</h1>
    <div class="checkout-layout">
      <form id="details-form" class="panel">
        <h2>Review & Verify</h2>
        <p class="card-desc">Confirm your delivery address and choose a payment method. Then we will verify with OTP.</p>

        <div id="address-summary"></div>

        <label for="paymentMethod">Payment Method</label>
        <select id="paymentMethod" name="paymentMethod" required>
          <option value="COD">Cash on Delivery (Recommended)</option>
          <option value="UPI">UPI (Demo)</option>
          <option value="CARD">Card (Demo)</option>
        </select>

        <button class="btn btn-primary full" id="proceed-to-otp-btn" type="submit">Continue to OTP</button>
        <p class="status-msg" id="details-status"></p>
      </form>

      <aside class="panel">
        <h2>Your Order</h2>
        <div id="checkout-cart-items"></div>
        <div class="checkout-total-row">
          <span>Total</span>
          <strong id="checkout-total">INR 0</strong>
        </div>
      </aside>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-row">
      <p>Secure checkout by Mcart.</p>
    </div>
  </footer>

  <div class="cart-overlay" data-close-cart></div>
  <aside class="cart-drawer" aria-label="Shopping cart">
    <div class="cart-drawer-head">
      <h3>Your Cart</h3>
      <button type="button" data-close-cart aria-label="Close cart">x</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-drawer-foot">
      <p>Total: <strong id="cart-total">INR 0</strong></p>
      <button class="btn btn-primary full" type="button" data-checkout-link>Go To Checkout</button>
    </div>
  </aside>

  <div class="toast" id="toast"></div>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/card-details.js"></script>
</body>
</html>
