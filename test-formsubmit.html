<!DOCTYPE html>
<html>
<head>
    <title>Test FormSubmit.co</title>
</head>
<body>
    <h1>Test FormSubmit.co</h1>
    
    <!-- Simple test form -->
    <form id="simple-test" action="https://formsubmit.co/support@indicart.store" method="POST">
        <input type="hidden" name="_subject" value="Test Form">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="http://localhost:8000/test-success.html">
        
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
        
        <button type="submit">Submit Test</button>
    </form>
    
    <script>
        console.log('Test page loaded');
        document.querySelector('form').addEventListener('submit', function(e) {
            console.log('Form submitting...');
            console.log('Action:', this.action);
            console.log('Method:', this.method);
        });
    </script>
</body>
</html>
