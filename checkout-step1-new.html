<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

<body class="checkout-step1-new">
  <div class="site-bg"></div>

  <header class="topbar">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Indicart</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="checkout-step1-new.html" class="is-active">Checkout</a>
      </nav>
      <button class="cart-icon-btn" type="button" data-open-cart>
        Cart <span class="cart-count" data-cart-count>0</span>
      </button>
    </div>
  </header>

  <main class="container section">
    <div class="checkout-progress">
      <div class="progress-step active">1. Contact Info</div>
      <div class="progress-step">2. Payment</div>
      <div class="progress-step">3. Verification</div>
    </div>

    <div class="checkout-layout">
      <form id="checkout-form" class="step1-panel" method="post">
        <div class="form-header">
          <div class="form-title-section">
            <h2>Contact Information</h2>
            <p class="card-desc">Step 1 of 3: Enter your contact details and delivery address.</p>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="fullName">Full Name *</label>
            <input id="fullName" name="fullName" type="text" placeholder="Your full name" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">Email Address *</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="phone">Phone Number *</label>
            <div class="phone-input-group">
              <select id="countryCode" name="countryCode" class="country-code">
                <option value="+1">+1 (USA)</option>
                <option value="+44">+44 (UK)</option>
                <option value="+91" selected>+91 (India)</option>
                <option value="+61">+61 (Australia)</option>
                <option value="+86">+86 (China)</option>
              </select>
              <input id="phone" name="phone" type="tel" inputmode="numeric" maxlength="15" placeholder="Phone number" required />
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="streetAddress">Street Address *</label>
            <textarea id="streetAddress" name="address" placeholder="House number, street name, apartment number" required></textarea>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="addressLine2">Address Line 2</label>
            <input id="addressLine2" name="address2" type="text" placeholder="Apartment, suite, unit, building, floor" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="city">City *</label>
            <input id="city" name="city" type="text" placeholder="City name" required />
          </div>
          <div class="form-group">
            <label for="state">State *</label>
            <input id="state" name="state" type="text" placeholder="State name" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="pincode">PIN Code *</label>
            <input id="pincode" name="pincode" type="text" inputmode="numeric" maxlength="6" placeholder="6-digit PIN code" required />
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="history.back()">Back</button>
          <button type="submit" class="btn btn-primary" id="continue-btn">Continue to Payment</button>
        </div>

        <div id="form-status" class="form-status"></div>
      </form>

      <aside class="panel order-summary">
        <h3>Order Summary</h3>
        <div id="checkout-cart-items"></div>
        <div class="order-total">
          <strong>Total: <span id="checkout-total">INR 0</span></strong>
        </div>
      </aside>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-row">
      <p>2026 Indicart. Secure checkout powered by modern web technology.</p>
    </div>
  </footer>

  <div class="cart-overlay" data-close-cart></div>
  <aside class="cart-drawer" aria-label="Shopping cart">
    <div class="cart-drawer-head">
      <h3>Your Cart</h3>
      <button type="button" data-close-cart aria-label="Close cart">x</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-drawer-foot">
      <p>Total: <strong id="cart-total">INR 0</strong></p>
      <button class="btn btn-primary full" type="button" data-checkout-link>Go To Checkout</button>
    </div>
  </aside>

  <div class="toast" id="toast"></div>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/email-service.js"></script>
  <script src="js/checkout-step1.js"></script>
</body>
</html>
