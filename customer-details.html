<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mcart | Customer Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="site-bg"></div>

  <header class="topbar">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Mcart</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="checkout.html" class="is-active">Checkout</a>
      </nav>
      <button class="cart-icon-btn" type="button" data-open-cart>
        Cart <span class="cart-count" data-cart-count>0</span>
      </button>
    </div>
  </header>

  <main class="container section">
    <h1>Customer Details</h1>
    <div class="checkout-layout">
      <form id="customer-form" class="panel" novalidate>
        <div class="brand-badge" aria-label="Mcart brand">
          <div class="brand-badge-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M7.2 8.2V7a4.8 4.8 0 0 1 9.6 0v1.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M6.3 8.2h11.4c.8 0 1.5.6 1.6 1.4l.9 9.2c.1 1-.7 1.9-1.7 1.9H5.5c-1 0-1.8-.9-1.7-1.9l.9-9.2c.1-.8.8-1.4 1.6-1.4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M9.2 13.2l2.1 2.2 3.5-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="brand-badge-text">
            <div class="brand-badge-name">Mcart</div>
            <div class="brand-badge-sub">Checkout</div>
          </div>
        </div>

        <h2>Contact & Instructions</h2>
        <p class="card-desc">Step 2 of 3: add your contact details and any order instructions.</p>

        <div id="address-summary"></div>
        <p class="tiny-note"><a href="checkout.html">Edit address</a></p>

        <div class="two-col">
          <div>
            <label for="firstName">First Name</label>
            <input id="firstName" name="firstName" type="text" required />
          </div>
          <div>
            <label for="lastName">Last Name</label>
            <input id="lastName" name="lastName" type="text" required />
          </div>
        </div>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />

        <label for="phone">Phone Number</label>
        <input id="phone" name="phone" type="tel" required />

        <label for="instructions">Order Instructions (Optional)</label>
        <textarea id="instructions" name="instructions" placeholder="Any notes for delivery?"></textarea>

        <button class="btn btn-primary full" id="confirm-order-btn" type="submit">Continue</button>
        <p class="status-msg" id="customer-status"></p>
      </form>

      <aside class="panel">
        <h2>Your Order</h2>
        <div id="checkout-cart-items"></div>
        <div class="checkout-total-row">
          <span>Total</span>
          <strong id="checkout-total">INR 0</strong>
        </div>
      </aside>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-row">
      <p>Secure checkout by Mcart.</p>
    </div>
  </footer>

  <div class="cart-overlay" data-close-cart></div>
  <aside class="cart-drawer" aria-label="Shopping cart">
    <div class="cart-drawer-head">
      <h3>Your Cart</h3>
      <button type="button" data-close-cart aria-label="Close cart">x</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-drawer-foot">
      <p>Total: <strong id="cart-total">INR 0</strong></p>
      <button class="btn btn-primary full" type="button" data-checkout-link>Go To Checkout</button>
    </div>
  </aside>

  <div class="toast" id="toast"></div>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/customer-details.js"></script>
</body>
</html>
